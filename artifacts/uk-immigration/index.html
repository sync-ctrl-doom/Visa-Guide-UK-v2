    <!-- JSON-LD: FAQ (top-level for homepage AI discovery) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How much does a Skilled Worker visa cost in the UK in 2024?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The Skilled Worker visa costs £719 for up to 3 years or £1,420 for over 3 years when applied from outside the UK. Applications from within the UK cost £827 or £1,639. The Immigration Health Surcharge (IHS) adds £1,035 per year on top of these fees. (Source: UK Home Office, 2024)"
          }
        },
        {
          "@type": "Question",
          "name": "How long does it take to get a UK Skilled Worker visa?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Standard processing takes approximately 3 weeks from outside the UK. Priority service (£500 extra) takes about 5 working days. From within the UK, standard processing takes up to 8 weeks, while Super Priority (£1,000 extra) provides a next working day decision."
          }
        },
        {
          "@type": "Question",
          "name": "What is the minimum salary for a Skilled Worker visa in 2024?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "From April 2024, the general minimum salary threshold for the Skilled Worker visa is £38,700 per year, or the going rate for the specific occupation code — whichever is higher. Certain shortage occupations and new entrants may qualify at lower thresholds."
          }
        },
        {
          "@type": "Question",
          "name": "Can I bring my family to the UK on a Skilled Worker visa?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Your spouse or partner and children under 18 can apply as dependants on your Skilled Worker visa. Each dependant must pay their own visa fee (£551–£1,120 depending on duration) and the Immigration Health Surcharge."
          }
        },
        {
          "@type": "Question",
          "name": "What is the difference between ILR and British citizenship?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Indefinite Leave to Remain (ILR) grants permanent residence in the UK but you remain a foreign national. British citizenship (naturalisation) grants full British nationality including a passport. You can typically apply for citizenship 12 months after receiving ILR, having accumulated 5 years of qualifying residence."
          }
        }
      ]
    }
    </script>
