kind = "web"
previewPath = "/"
title = "Britannia Visas and Immigration Consultancy"
version = "1.0.0"
id = "artifacts/uk-immigration"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25594

[services.development]
run = "pnpm --filter @workspace/uk-immigration run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/uk-immigration", "run", "build" ]
publicDir = "artifacts/uk-immigration/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25594"
BASE_PATH = "/"
